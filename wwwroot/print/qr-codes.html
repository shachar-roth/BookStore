<!doctype html>
<html lang="he" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>קודי QR להדפסה - עין המלך</title>
    <style>
        @page {
            size: A4;
            margin: 14mm;
        }

        :root {
            --ink: #1f2529;
            --muted: #5f6f78;
            --paper: #fffdf8;
            --accent: #b98336;
            --card: #ffffff;
            --line: #d9cbb7;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--paper);
            color: var(--ink);
            font-family: "Noto Serif Hebrew", "David", "Times New Roman", serif;
        }

        .sheet {
            width: 100%;
            min-height: calc(297mm - 28mm);
            display: flex;
            flex-direction: column;
            gap: 16mm;
            align-items: center;
            justify-content: center;
        }

        .page-title {
            margin: 0;
            color: var(--accent);
            font-size: 34pt;
            font-weight: 800;
            letter-spacing: 0.04em;
            text-align: center;
        }

        .subtitle {
            margin: -10mm 0 0;
            color: var(--muted);
            font-size: 13pt;
            text-align: center;
        }

        .qr-grid {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 9mm;
        }

        .qr-card {
            min-height: 92mm;
            padding: 8mm 6mm;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            gap: 5mm;
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 9mm;
            box-shadow: 0 8px 28px rgba(68, 59, 48, 0.12);
            break-inside: avoid;
        }

        .qr-card h2 {
            margin: 0;
            font-size: 19pt;
            line-height: 1.2;
            text-align: center;
        }

        .qr-card img {
            width: 54mm;
            height: 54mm;
            object-fit: contain;
            display: block;
        }

        .qr-note {
            min-height: 12mm;
            margin: 0;
            color: var(--muted);
            font-size: 10.5pt;
            line-height: 1.35;
            text-align: center;
            direction: ltr;
        }

        .print-actions {
            position: fixed;
            left: 18px;
            bottom: 18px;
        }

        .print-actions button {
            padding: 12px 18px;
            border: 0;
            border-radius: 999px;
            background: var(--accent);
            color: white;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 22px rgba(92, 65, 34, 0.22);
        }

        @media print {
            body {
                background: white;
            }

            .print-actions {
                display: none;
            }

            .qr-card {
                box-shadow: none;
            }
        }

        @media (max-width: 760px) {
            .sheet {
                min-height: auto;
                padding: 24px;
                justify-content: flex-start;
            }

            .qr-grid {
                grid-template-columns: 1fr;
            }

            .qr-card img {
                width: min(68vw, 220px);
                height: min(68vw, 220px);
            }
        }
    </style>
</head>
<body>
    <main class="sheet" aria-label="קודי QR להדפסה">
        <h1 class="page-title">עין המלך</h1>
        <p class="subtitle">קודי QR לתשלום ולכניסה לאתר</p>

        <section class="qr-grid">
            <article class="qr-card">
                <h2>תשלום בביט</h2>
                <img src="../media/payments/bit-qr.svg" alt="קוד QR לתשלום בביט">
                <p class="qr-note">Bit</p>
            </article>

            <article class="qr-card">
                <h2>תשלום בפייבוקס</h2>
                <img src="../media/payments/paybox-qr.svg" alt="קוד QR לתשלום בפייבוקס">
                <p class="qr-note">PayBox</p>
            </article>

            <article class="qr-card">
                <h2>האתר של עין המלך</h2>
                <img src="../media/payments/website-qr.svg" alt="קוד QR לאתר עין המלך">
                <p class="qr-note">ein-hamelech.shakedshira.com</p>
            </article>
        </section>
    </main>

    <div class="print-actions">
        <button type="button" onclick="window.print()">הדפסה</button>
    </div>
</body>
</html>
