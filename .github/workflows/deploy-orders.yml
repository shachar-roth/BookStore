name: Deploy Orders Worker

on:
  push:
    branches:
      - main
    paths:
      - "api/ein-hamelech-orders.js"
      - "wrangler.orders.jsonc"
      - ".github/workflows/deploy-orders.yml"
  workflow_dispatch:

jobs:
  deploy-orders:
    runs-on: ubuntu-latest
    environment: Cloudflare

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Wrangler
        run: npm install --global wrangler@4

      - name: Set Resend Worker secret
        shell: bash
        run: |
          test -n "$RESEND_API_KEY" || (echo "RESEND_API_KEY is missing" && exit 1)
          printf "%s" "$RESEND_API_KEY" | wrangler secret put RESEND_API_KEY --config wrangler.orders.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: dfd37999070f7d447cb12716687a92f1
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

      - name: Deploy orders Worker
        run: wrangler deploy --config wrangler.orders.jsonc --keep-vars
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: dfd37999070f7d447cb12716687a92f1
